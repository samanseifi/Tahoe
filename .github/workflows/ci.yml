name: CI — Serial Build & Benchmarks

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build-and-test:
    name: Build, Unit Tests & Benchmarks (serial)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential libexodusii-dev libnetcdf-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTAHOE_EXPAT=ON \
            -DTAHOE_SPOOLES=ON \
            -DTAHOE_SUPERLU=ON \
            -DTAHOE_F2C=ON \
            -DTAHOE_DEV=ON \
            -DTAHOE_TESTS=ON \
            -DTAHOE_MPI=OFF \
            -DTAHOE_SEACAS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      # ---------------------------------------------------------------
      # Unit tests — must pass, block CI on failure
      # ---------------------------------------------------------------
      - name: Unit tests (CTest / Google Test)
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

      # ---------------------------------------------------------------
      # Serial benchmarks level.0 – level.2
      #
      # Pass criterion: CRASH = 0  (tahoe binary exits 0 for every test)
      # Tolerated:      FAIL  > 0  (reference comparison failures;
      #                             many are known — ExodusII format
      #                             mismatches, optional-module tests,
      #                             mat.11 unregistered material, etc.)
      # ---------------------------------------------------------------
      - name: Benchmarks level.0 (core physics)
        run: |
          ./run_benchmarks.sh level.0
        env:
          TAHOE:    ${{ github.workspace }}/build/bin/tahoe
          COMPARE:  ${{ github.workspace }}/build/bin/compare
          BENCH_ROOT: ${{ github.workspace }}/benchmark_XML

      - name: Benchmarks level.1 (constitutive models)
        run: |
          ./run_benchmarks.sh level.1
        env:
          TAHOE:    ${{ github.workspace }}/build/bin/tahoe
          COMPARE:  ${{ github.workspace }}/build/bin/compare
          BENCH_ROOT: ${{ github.workspace }}/benchmark_XML

      - name: Benchmarks level.2 (extended capabilities)
        run: |
          ./run_benchmarks.sh level.2
        env:
          TAHOE:    ${{ github.workspace }}/build/bin/tahoe
          COMPARE:  ${{ github.workspace }}/build/bin/compare
          BENCH_ROOT: ${{ github.workspace }}/benchmark_XML
